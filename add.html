<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasos Projects - Welcome</title>
    <style>
        /* Modern Background με Gradient */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
            color: #fff;
        }

        /* Το Κεντρικό Κουτί (Glassmorphism Effect) */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.8s ease-out;
        }

        h2 {
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Group για το Input */
        .input-group {
            margin-bottom: 30px;
            position: relative;
        }

        /* Το Input Πεδίο με Animation */
        input[type="text"] {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            outline: none;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        /* Animation όταν κάνεις κλικ στο input */
        input[type="text"]:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
            background: rgba(0, 0, 0, 0.4);
        }

        /* Το Κουμπί Confirm με Εφέ */
        .btn-confirm {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #38bdf8 0%, #4f46e5 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(79, 70, 229, 0.4);
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
        }

        /* Animation στο Hover του κουμπιού */
        .btn-confirm:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(56, 189, 248, 0.6);
            filter: brightness(1.1);
        }

        .btn-confirm:active {
            transform: translateY(1px);
        }

        /* Keyframes για το Fade In του κουτιού */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Welcome!</h2>
        
        <!-- Η Φόρμα -->
        <form id="nameForm">
            <div class="input-group">
                <input type="text" id="username" placeholder="Write your name" required autocomplete="off">
            </div>
            <button type="submit" class="btn-confirm">Confirm</button>
        </form>
    </div>

    <!-- JavaScript για την αποστολή και την ανακατεύθυνση -->
    <script>
        document.getElementById('nameForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Σταματάει το κλασικό reload

            const nameInput = document.getElementById('username').value;
// Εδώ στέλνουμε το όνομα στον Node.js server σου
            fetch('/add-name', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ name: nameInput })
            })
            .then(response => {
                if (response.ok) {
                    // ΜΟΛΙΣ ΜΠΕΙ ΣΤΗ ΒΑΣΗ, ΣΕ ΣΤΕΛΝΕΙ ΣΤΟ ΚΑΙΝΟΥΡΓΙΟ LINK!
                    // Αντικατάστησε το X_LINK_HERE_X με το link που θες (https://share.google/pxinPbHcomJtLTbeo)
                    window.location.href = "X_LINK_HERE_X"; 
                } else {
                    alert("Κάτι πήγε λάθος με την αποθήκευση.");
                }
            })
            .catch(err => console.error("Error:", err));
        });
    </script>

</body>
</html>
